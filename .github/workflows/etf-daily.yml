# ETF 全市场宽松趋势强度 — 每个交易日北京时间约 15:30 自动跑批
# 也可在 GitHub 网页 Actions 里点「Run workflow」手动触发
name: ETF daily screen

on:
  schedule:
    # UTC 07:30 = 北京时间 15:30（周一～周五）
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

jobs:
  etf-screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: model/sanyaosukuangjia/requirements-etf.txt

      - name: Install dependencies
        run: pip install -r model/sanyaosukuangjia/requirements-etf.txt

      - name: Run ETF trend screen
        working-directory: model/sanyaosukuangjia
        run: python -u etf_trend_up_screen_loose.py --workers 4 --refresh-universe

      - name: Upload result xlsx
        uses: actions/upload-artifact@v4
        with:
          name: etf-trend-${{ github.run_number }}-${{ github.run_attempt }}
          path: model/sanyaosukuangjia/outputs/**/*.xlsx
          retention-days: 30
          if-no-files-found: error
